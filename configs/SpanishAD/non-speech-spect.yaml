experiment_output_dir: Paper-IS26-experiments/
only_alignment_contains: non_speech

dataset:
    name: spanishad
    metadata: dataframes/metadata.csv
    manual_aligns: dataframes/aligns/manual_patient.pkl
    base_audio_path: 11025_16000/
    apply_denoise: true

############ ALIGNERS CONFIGURATION ############
aligners:  
  - name: manual
    params:
      filename: manual_ipu
  
  - name: silero
    params:
      threshold: 0.2
      sample_rate: 16000
        
  - name: pyannote
    params:
      huggingface_token: ''

############ SPLITS CONFIGURATION ############
splits:
  folds_amount: 8
  repetitions: 10
  group_column: subject

############ FEATURES CONFIGURATION ############
features:        
  - name: spectrogram
    params:
      n_fft: 400
      hop_length: 160
      sample_rate: 16000
      concatenate_segments: true
      segmenter:
        size: 5
        overlap: 4

############ MODEL CONFIGURATION ############
model:
  name: AcousticCNNClassifier
  n_jobs: 1
  group_column: subject
  shuffle: true
  wrap_last: true
  batch_size: 32
  epochs: 80
  dropout: 0.3
  projection_dim: 128
  channel_multiplier: 0.5
  early_stopping: 
    patience: 10
    metric: loss
  
  bootstrapping:
    n_bootstraps: 1000
    stratify: true