experiment_output_dir: IS26-experiments/
only_alignment_contains: non_speech

dataset:
    name: adresso
    original_audio_path: ADReSSo21/original_audios/diagnosis/train/audio
    challenge_audio_path: ADReSSo21/ADReSSo21-diagnosis/diagnosis/train/audio
    apply_enhance: true

############ ALIGNERS CONFIGURATION ############
aligners:  
  - name: pyannote
    params:
      huggingface_token: ''

  - name: silero
    params:
      threshold: 0.2
      sample_rate: 16000
  
  - name: silero
    params:
      threshold: 0.2
      sample_rate: 16000
      audio_path: ADReSSo21/ADReSSo21-diagnosis/diagnosis/train/audio

  - name: silero
    params:
      threshold: 0.2
      sample_rate: 16000
      audio_path: ADReSSo21/ADReSSo21-diagnosis/diagnosis/train/audio
      samples_to_ignore: configs/ADReSSo/lists/silero_with_speech_challenge.csv

######## SPLITS CONFIGURATION ############
splits:
  folds_amount: 8
  repetitions: 10
  group_column: subject
 
############# FEATURES CONFIGURATION ############
features: 
  - name: mfcc
    params:
      n_mfcc: 40
      sample_rate: 16000
      melkwargs:
        n_fft: 400
        hop_length: 160
        n_mels: 80
        center: false
        power: 2.0
        mel_scale: slaney
        norm: slaney
      concatenate_segments: true

  - name: mfcc
    params:
      n_mfcc: 40
      sample_rate: 16000
      melkwargs:
        n_fft: 400
        hop_length: 160
        n_mels: 80
        center: false
        power: 2.0
        mel_scale: slaney
        norm: slaney
      concatenate_segments: true
      segmenter:
        size: 5
        overlap: 4
 
############# MODEL CONFIGURATION ############
model:
  name: AcousticCNNClassifier
  n_jobs: 4
  group_column: subject
  shuffle: true
  wrap_last: true
  batch_size: 32
  epochs: 80
  dropout: 0.3
  projection_dim: 128
  early_stopping: 
    patience: 5
    metric: loss
  
  bootstrapping:
    n_bootstraps: 1000
    stratify: true